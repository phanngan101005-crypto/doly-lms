<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiet lop hoc - DOLY LMS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="../api/client.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    'brand-blue': '#0A2FB6', 'brand-cyan': '#00E5FF', 'brand-purple': '#9D00FF', 'brand-yellow': '#FFD700', 'brand-dark': '#0B0F19',
                },
                fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], display: ['Montserrat', 'sans-serif'] },
            }
        }
    }
</script>
<style>
    html, body { overflow-x: hidden !important; width: 100%; max-width: 100%; position: relative; }
    body { background-color: #f8fafc; color: #334155; }
    .dark body { background-color: #0f172a; color: #cbd5e1; }
    
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    
    .aurora-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; overflow: hidden; }
    .dark .aurora-bg { opacity: 0.15; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: floatOrb 25s infinite alternate ease-in-out; }
    .orb-1 { width: 70vw; height: 70vw; background: #c7d2fe; top: -20%; left: -10%; }
    .orb-2 { width: 60vw; height: 60vw; background: #e9d5ff; bottom: -20%; right: -10%; animation-delay: -5s; }
    @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10vw, -10vh) scale(1.1); } }

    .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.8); }
    .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border-color: rgba(255, 255, 255, 0.1); }
    
    .clean-card { background: #ffffff; border-radius: 2rem; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); transition: all 0.3s; }
    .dark .clean-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px); border-color: rgba(255, 255, 255, 0.05); }
</style>
</head>
<body class="antialiased selection:bg-brand-blue selection:text-white flex flex-col min-h-screen relative">

<div class="aurora-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="fixed top-6 left-0 w-full z-50 px-6 flex justify-center">
    <header class="w-full max-w-7xl glass-panel !rounded-full px-8 py-3 flex justify-between items-center shadow-sm">
        <a href="lophoc.html" class="flex items-center gap-3">
            <div class="w-10 h-10 flex items-center justify-center">
                <img src="../logodoly.png" alt="Doly Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="text-lg font-display font-black text-brand-dark dark:text-white hidden sm:block">DOLY LMS</h1>
        </a>
        
       <nav class="hidden lg:flex flex-1 justify-center gap-6 xl:gap-12 text-[11px] xl:text-[13px] font-bold uppercase tracking-wide text-[#1e2b4d] dark:text-slate-300 mx-4">
            <a href="dashboad.html" class="opacity-85 hover:opacity-100 transition-opacity whitespace-nowrap">TRANG CHỦ</a>
            <a href="lophoc.html" class="relative after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-full after:h-[3px] after:bg-[#1e2b4d] dark:after:bg-brand-cyan whitespace-nowrap">LỚP HỌC</a>
            <a href="hocthuat.html" class="opacity-85 hover:opacity-100 transition-opacity whitespace-nowrap">HỌC TẬP</a>
            <a href="khokiemtra.html" class="opacity-85 hover:opacity-100 transition-opacity whitespace-nowrap">KHO KIỂM TRA</a>
            <a href="diendan.html" class="opacity-85 hover:opacity-100 transition-opacity whitespace-nowrap">DIỄN ĐÀN VÀ CỘNG ĐỒNG</a>
            <a href="tintuc.html" class="opacity-85 hover:opacity-100 transition-opacity whitespace-nowrap">TIN TỨC</a>
        </nav>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 flex items-center justify-center hover:scale-110 transition shadow-sm border border-transparent dark:border-slate-700">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:block text-brand-yellow"></i>
            </button>
            <button onclick="handleLogout()" class="w-9 h-9 rounded-full bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400 flex items-center justify-center hover:scale-110 transition shadow-sm border border-red-200 dark:border-red-800" title="Dang xuat">
                <i class="fas fa-sign-out-alt text-sm"></i>
            </button>
            <button class="w-10 h-10 rounded-full border-2 border-brand-blue dark:border-brand-cyan overflow-hidden hover:scale-105 transition shadow-sm p-0.5">
                <div id="header-avatar" class="w-full h-full rounded-full bg-gradient-to-br from-brand-blue to-brand-cyan flex items-center justify-center text-white font-display font-black text-sm uppercase">HS</div>
            </button>
        </div>
    </header>
</div>

<main class="flex-1 container mx-auto px-4 md:px-6 pt-32 pb-12 max-w-7xl relative z-10">
    
    <!-- Back + Title -->
    <div class="flex items-center gap-4 mb-8">
        <a href="lophoc.html" class="w-11 h-11 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 hover:text-brand-blue hover:shadow-md transition-all shadow-sm">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 id="page-title" class="text-2xl md:text-3xl font-display font-black text-brand-dark dark:text-white">KHONG GIAN LOP HOC</h1>
    </div>

    <!-- Banner Lop -->
    <div id="class-banner" class="bg-gradient-to-r from-brand-blue to-indigo-600 rounded-[2rem] p-8 shadow-soft text-white relative overflow-hidden flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
        <div class="absolute -right-10 -top-10 w-48 h-48 bg-white/10 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 right-32 w-32 h-32 bg-white/10 rounded-full blur-xl"></div>
        
        <div class="flex items-center gap-6 relative z-10">
            <div id="class-symbol" class="w-20 h-20 rounded-2xl bg-white/20 backdrop-blur-sm border border-white/30 flex items-center justify-center font-black text-3xl shadow-inner">--</div>
            <div>
                <h2 id="class-name" class="text-2xl md:text-3xl font-extrabold mb-1.5 drop-shadow-sm">Dang tai...</h2>
                <p id="class-teacher" class="text-blue-100 font-bold flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-chalkboard-user opacity-80"></i> Giao vien: ...
                </p>
            </div>
        </div>
        
        <div class="relative z-10 flex gap-3">
            <div id="assignment-count-card" class="bg-white/10 backdrop-blur-sm border border-white/20 px-5 py-3 rounded-2xl text-center">
                <p class="text-[10px] uppercase tracking-widest text-blue-100 font-bold mb-1">Bai tap</p>
                <p class="font-black text-xl leading-none" id="assignment-count">0</p>
            </div>
            <div id="due-count-card" class="bg-amber-400/20 backdrop-blur-sm border border-amber-300/30 px-5 py-3 rounded-2xl text-center">
                <p class="text-[10px] uppercase tracking-widest text-amber-200 font-bold mb-1">Can lam</p>
                <p class="font-black text-xl leading-none text-amber-300" id="due-count">0</p>
            </div>
        </div>
    </div>

    <!-- Inner grid: Assignments + History -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Cot trai: Bai tap -->
        <div class="lg:col-span-2 space-y-6">
            <h3 class="text-xl font-extrabold text-slate-800 dark:text-white flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-brand-blue/10 text-brand-blue flex items-center justify-center text-lg">
                    <i class="fa-solid fa-pen-clip"></i>
                </div>
                Bai tap can hoan thanh
            </h3>
            
            <div id="assignments-container" class="space-y-4">
                <div class="flex justify-center py-12">
                    <div class="w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
        
        <!-- Cot phai: Lich su -->
        <div class="space-y-6">
            <h3 class="text-xl font-extrabold text-slate-800 dark:text-white flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg">
                    <i class="fa-solid fa-check-double"></i>
                </div>
                Lich su nop bai
            </h3>
            
            <div id="history-container" class="clean-card p-6 space-y-4">
                <div class="flex justify-center py-8">
                    <div class="w-8 h-8 border-4 border-green-200 border-t-green-600 rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </div>

</main>

<script>
    DolyAPI.requireAuth();

    var activeClassId = null;

    document.addEventListener('DOMContentLoaded', function() {
        var user = DolyAPI.loadSession();
        var avatarEl = document.getElementById('header-avatar');
        if (avatarEl && user && user.full_name) {
            avatarEl.textContent = user.full_name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
        }

        // Get class_id from URL
        var params = new URLSearchParams(window.location.search);
        activeClassId = parseInt(params.get('class_id'), 10);
        if (!activeClassId) {
            document.getElementById('class-name').textContent = 'Thieu class_id';
            return;
        }

        loadClassDetail();
    });

    function loadClassDetail() {
        // Load class info
        DolyAPI.getClasses().then(function(classes) {
            var cls = classes ? classes.find(function(c) { return c.id === activeClassId; }) : null;
            if (cls) {
                document.getElementById('class-symbol').textContent = cls.symbol || cls.name.substring(0,3).toUpperCase() || 'LOP';
                document.getElementById('class-name').textContent = cls.name || 'Lop hoc';
                document.getElementById('class-teacher').innerHTML = '<i class="fa-solid fa-chalkboard-user opacity-80"></i> Giao vien: ' + DolyAPI.esc(cls.teacher_name || '...');
                document.getElementById('page-title').textContent = cls.name ? cls.name.toUpperCase() : 'KHONG GIAN LOP HOC';
            }
        }).catch(function() {});

        // Load assignments
        loadAssignments();
        // Load history
        loadHistory();
    }

    function loadHistory() {
        var container = document.getElementById('history-container');
        if (!container) return;

        DolyAPI.getGrades(activeClassId).then(function(grades) {
            var list = grades || [];
            if (!list.length) {
                container.innerHTML = '<div class="text-center py-6 text-slate-400 font-bold text-sm">Chua co lich su nop bai.</div>';
                return;
            }

            var html = '';
            list.forEach(function(g, idx) {
                var title = g.title || g.assignment_name || g.name || 'Bai tap';
                var submittedAt = g.graded_at || '';
                if (submittedAt) {
                    submittedAt = submittedAt.split(' ')[0];
                    submittedAt = 'Nop: ' + submittedAt;
                }

                var scoreDisplay, scoreStatus;
                if (g.score !== null && g.max_score !== null) {
                    var scaled = (g.max_score > 0) ? ((g.score / g.max_score) * 10).toFixed(1) : '-';
                    scoreDisplay = '<span class="text-emerald-600 font-black text-xl leading-none">' + scaled + '</span>';
                    scoreStatus = '<span class="text-[10px] text-emerald-500 font-bold mt-1 uppercase tracking-wider bg-emerald-50 px-2 rounded">Da cham</span>';
                } else {
                    scoreDisplay = '<span class="text-slate-400 font-black text-xl leading-none">-</span>';
                    scoreStatus = '<span class="text-[10px] text-amber-500 font-bold mt-1 uppercase tracking-wider bg-amber-50 px-2 py-0.5 rounded border border-amber-100">Cho cham</span>';
                }

                var borderClass = idx < list.length - 1 ? 'pb-4 border-b border-slate-100' : '';
                html += '<div class="flex items-start justify-between ' + borderClass + ' group">' +
                    '<div>' +
                        '<h4 class="font-bold text-slate-700 text-[15px] group-hover:text-brand-blue transition-colors">' + DolyAPI.esc(title) + '</h4>' +
                        '<p class="text-[12px] text-slate-400 font-bold mt-1">' + DolyAPI.esc(submittedAt) + '</p>' +
                    '</div>' +
                    '<div class="flex flex-col items-end">' +
                        scoreDisplay +
                        scoreStatus +
                    '</div>' +
                '</div>';
            });
            container.innerHTML = '<div class="space-y-4">' + html + '</div>';
        }).catch(function() {
            container.innerHTML = '<div class="text-center py-6 text-red-400 font-bold text-sm">Khong the tai lich su.</div>';
        });
    }

    function loadAssignments() {
        var container = document.getElementById('assignments-container');
        if (!container) return;

        DolyAPI.getAssignments(activeClassId).then(function(assignments) {
            if (!assignments || assignments.length === 0) {
                container.innerHTML = '<div class="clean-card p-8 text-center"><p class="text-slate-400 font-bold">Chua co bai tap nao.</p></div>';
                document.getElementById('assignment-count').textContent = '0';
                document.getElementById('due-count').textContent = '0';
                return;
            }

            document.getElementById('assignment-count').textContent = assignments.length;

            var pendingCount = 0;
            var html = '';
            assignments.forEach(function(a) {
                var sub = a.submission || { status: 'not_submitted' };
                var isSubmitted = sub.status === 'submitted' || sub.status === 'graded';
                var isOverdue = a.due_date && new Date(a.due_date) < new Date() && !isSubmitted;
                var borderClass = isOverdue ? 'border-red-200' : (isSubmitted ? 'border-slate-200' : 'border-amber-200');
                var barClass = isOverdue ? 'bg-red-500' : (isSubmitted ? 'bg-emerald-500' : 'bg-amber-500');
                var iconClass = isOverdue ? 'text-red-500 bg-red-50' : (isSubmitted ? 'text-emerald-500 bg-emerald-50' : 'text-amber-500 bg-amber-50');
                var icon = isSubmitted ? '<i class="fa-solid fa-check-circle"></i>' : '<i class="fa-solid fa-file-signature"></i>';

                if (!isSubmitted) pendingCount++;

                var dueStr = '';
                if (a.due_date) {
                    var d = new Date(a.due_date);
                    dueStr = d.toLocaleDateString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric' });
                }
                var dueClass = isOverdue ? 'text-red-500 bg-red-50 border-red-100' : 'text-slate-500 bg-slate-100 border-slate-200';

                html += '<div class="clean-card p-6 border ' + borderClass + ' flex flex-col sm:flex-row sm:items-center justify-between gap-5 relative overflow-hidden">' +
                    '<div class="absolute top-0 left-0 w-1.5 h-full ' + barClass + '"></div>' +
                    '<div class="flex items-start gap-4 pl-2">' +
                        '<div class="w-12 h-12 rounded-xl ' + iconClass + ' flex items-center justify-center text-xl shrink-0">' + icon + '</div>' +
                        '<div>' +
                            '<h4 class="font-extrabold text-brand-dark dark:text-white text-lg">' + DolyAPI.esc(a.title || 'Bai tap') + '</h4>' +
                            (dueStr ? '<div class="mt-2 inline-flex items-center gap-1.5 text-xs font-bold ' + dueClass + ' px-2.5 py-1 rounded-md border"><i class="fa-regular fa-clock"></i> Han: ' + DolyAPI.esc(dueStr) + '</div>' : '') +
                            (isSubmitted && sub.score !== null ? '<div class="mt-2 text-xs font-bold text-emerald-600">Diem: ' + sub.score + '</div>' : '') +
                        '</div>' +
                    '</div>' +
                    (!isSubmitted ? '<a href="../layerhocsinhgiaovien/student_do_assignment.html?assignment_id=' + a.id + '" class="px-7 py-3 bg-brand-blue text-white shadow-sm shadow-blue-200 text-sm font-extrabold rounded-xl hover:bg-blue-700 active:scale-95 transition-all text-center whitespace-nowrap">Lam bai</a>' : '<span class="px-7 py-3 bg-emerald-50 text-emerald-600 border border-emerald-200 text-sm font-extrabold rounded-xl">Da nop</span>') +
                '</div>';
            });

            document.getElementById('due-count').textContent = pendingCount;
            container.innerHTML = html;
        }).catch(function() {
            container.innerHTML = '<div class="clean-card p-8 text-center"><p class="text-red-500 font-bold">Khong the tai bai tap.</p></div>';
        });
    }

    function handleLogout() {
        DolyAPI.logout().catch(function(){}).finally(function(){
            DolyAPI.clearSession();
            window.location.href = '../login.html';
        });
    }

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
    }
</script>
</body>
</html>
